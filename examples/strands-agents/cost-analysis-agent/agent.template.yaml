apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-analysis-agent
  namespace: strands-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cost-analysis-agent
  template:
    metadata:
      labels:
        app: cost-analysis-agent
    spec:
      serviceAccountName: cost-analysis-agent
      {{#unless useBuildx}}
      nodeSelector:
        kubernetes.io/arch: {{{arch}}}
      {{/unless}}
      containers:
        - name: agent
          image: {{{IMAGE}}}
          env:
            - name: USE_BEDROCK
              value: "{{{USE_BEDROCK}}}"
            {{#if USE_BEDROCK}}
            - name: BEDROCK_MODEL
              value: {{{BEDROCK_MODEL}}}
            {{else}}
            - name: LITELLM_BASE_URL
              value: {{{LITELLM_BASE_URL}}}
            - name: LITELLM_API_KEY
              value: {{{LITELLM_API_KEY}}}
            - name: LITELLM_MODEL_NAME
              value: {{{LITELLM_MODEL_NAME}}}
            {{/if}}
            {{#if LANGFUSE_HOST}}
            - name: LANGFUSE_HOST
              value: {{{LANGFUSE_HOST}}}
            - name: LANGFUSE_PUBLIC_KEY
              value: {{{LANGFUSE_PUBLIC_KEY}}}
            - name: LANGFUSE_SECRET_KEY
              value: {{{LANGFUSE_SECRET_KEY}}}
            {{/if}}
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cost-analysis-agent
  namespace: strands-agents
spec:
  selector:
    app: cost-analysis-agent
  ports:
    - name: http
      port: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cost-analysis-agent
  namespace: strands-agents
