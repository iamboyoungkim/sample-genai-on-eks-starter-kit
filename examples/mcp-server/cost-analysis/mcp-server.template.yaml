apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-analysis
  namespace: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cost-analysis
  template:
    metadata:
      labels:
        app: cost-analysis
    spec:
      serviceAccountName: cost-analysis
      {{#unless useBuildx}}
      nodeSelector:
        kubernetes.io/arch: {{{arch}}}
      {{/unless}}
      containers:
        - name: server
          image: {{{IMAGE}}}
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cost-analysis
  namespace: mcp-server
spec:
  selector:
    app: cost-analysis
  ports:
    - name: http
      port: 8000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cost-analysis
  namespace: mcp-server
